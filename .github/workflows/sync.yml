name: Sync LeetCode Tracker

on:
  push:
    branches:
      - main
    # No path filter — LeetSync pushes to the repo root, not python/.
    # Any push to main triggers this workflow.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Relocate new problems + update tracker
        run: python scripts/run.py --verbose

      - name: Commit changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage moved folders (git mv already staged in index) + README
          git add README.md python/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: reorganize and sync tracker — $(date -u +'%Y-%m-%d')"
            git push origin HEAD
          fi

name: Sync LeetCode Tracker

on:
  push:
    branches:
      - main
    # No paths filter — LeetSync pushes to the repo root ({N}-{name}/),
    # not under python/**. Filtering on python/** means the workflow never
    # fires for new submissions. Any push to main triggers this workflow.
  workflow_dispatch:  # Allow manual trigger from the Actions tab

permissions:
  contents: write  # needed to commit back README + organized/ changes

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run organizer + tracker
        run: |
          python scripts/run.py --clean-organized --verbose

      - name: Commit changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage README and organized/ — never stage raw solution folders
          git add README.md organized/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync tracker and organized view — $(date -u +'%Y-%m-%d')"
            git push origin HEAD
          fi
